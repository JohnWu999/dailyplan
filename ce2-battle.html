<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caesar's English II 拉丁词根闯关 - 20260510</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #E85D04; --gold: #C9A961; --bg: #FAF7F2; --text: #2C2C2C;
    --light-gold: rgba(201,169,97,0.15); --success: #2D8A3E; --danger: #C0392B;
    --card-bg: #ffffff; --boss: #8B1E1E; --boss-gold: #D4A017;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Noto Serif SC',Georgia,serif; background:var(--bg); color:var(--text); line-height:1.6; font-size:15px; overflow-x:hidden; min-height:100vh; }
  .screen { display:none; min-height:100vh; }
  .screen.active { display:flex; flex-direction:column; }

  /* ---- 登录 ---- */
  #login { align-items:center; justify-content:center; padding:40px 20px; }
  .login-box { max-width:400px; width:100%; text-align:center; }
  .login-box h1 { font-size:1.8em; margin-bottom:6px; }
  .login-box .subtitle { color:var(--gold); font-weight:600; margin-bottom:30px; }
  .login-input {
    width:100%; padding:14px 18px; font-size:1.1em; font-family:inherit;
    border:2px solid #e0e0e0; border-radius:12px; text-align:center; outline:none;
    margin-bottom:12px; transition:border-color .2s;
  }
  .login-input:focus { border-color:var(--gold); }
  .login-hint { font-size:0.8em; color:#999; margin-top:8px; }
  .user-list { margin-top:20px; text-align:left; }
  .user-list h4 { font-size:0.9em; color:#888; margin-bottom:8px; text-align:center; }
  .user-chip {
    display:inline-block; background:#fff; border:1px solid #e0e0e0; padding:6px 14px;
    border-radius:20px; margin:4px; font-size:0.9em; cursor:pointer; transition:all .15s;
  }
  .user-chip:hover { border-color:var(--gold); background:var(--light-gold); }

  /* ---- 封面 ---- */
  #cover { align-items:center; justify-content:center; text-align:center; padding:40px 20px; }
  .cover-box { max-width:480px; width:100%; }
  .cover-box h1 { font-size:1.9em; font-weight:700; margin-bottom:6px; letter-spacing:2px; }
  .cover-box .subtitle { color:var(--gold); font-weight:600; font-size:1.1em; margin-bottom:20px; }
  .gold-line { width:60px; height:3px; background:var(--gold); margin:0 auto 20px; border-radius:2px; }
  .cover-stats { display:flex; justify-content:center; gap:30px; margin:24px 0; font-size:0.9em; color:#666; }
  .cover-stats .stat-num { font-size:1.4em; font-weight:700; color:var(--primary); display:block; }
  .btn-main { display:inline-block; background:var(--primary); color:#fff; border:none; padding:14px 48px; font-size:1.05em; font-family:inherit; border-radius:30px; cursor:pointer; box-shadow:0 4px 14px rgba(232,93,4,0.35); transition:transform .15s,box-shadow .15s; margin-top:10px; }
  .btn-main:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(232,93,4,0.45); }
  .user-badge { display:inline-flex; align-items:center; gap:6px; background:var(--light-gold); color:var(--text); padding:6px 16px; border-radius:20px; font-size:0.9em; margin-bottom:14px; }
  .user-badge button { background:none; border:none; color:var(--primary); cursor:pointer; font-size:0.85em; }

  /* ---- 关卡选择 ---- */
  #levelSelect { padding:30px 20px; }
  .ls-header { text-align:center; margin-bottom:24px; }
  .ls-header h2 { font-size:1.5em; }
  .ls-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; max-width:900px; margin:0 auto; width:100%; }
  .level-card { background:var(--card-bg); border-radius:12px; padding:18px 16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); border-left:4px solid var(--gold); cursor:pointer; transition:transform .15s,box-shadow .15s; position:relative; }
  .level-card:hover:not(.locked) { transform:translateY(-3px); box-shadow:0 6px 18px rgba(0,0,0,0.1); }
  .level-card.locked { opacity:0.5; cursor:not-allowed; border-left-color:#ccc; }
  .level-card.boss { border-left-color:var(--boss); background:linear-gradient(135deg,#fff8f8, var(--card-bg)); }
  .level-card .lv-title { font-weight:700; font-size:1.1em; margin-bottom:2px; }
  .level-card .lv-sub { font-size:0.85em; color:#888; margin-bottom:8px; }
  .level-card .lv-meta { display:flex; justify-content:space-between; align-items:center; font-size:0.8em; color:#666; }
  .stars { color:var(--gold); letter-spacing:2px; } .stars.empty { color:#ddd; }
  .badge-lock { position:absolute; right:14px; top:14px; font-size:1.2em; }
  .boss-tag { position:absolute; right:14px; top:14px; background:var(--boss); color:#fff; font-size:0.7em; padding:2px 8px; border-radius:10px; }

  /* ---- 游戏 HUD ---- */
  #game { padding:0; }
  .hud { background:var(--card-bg); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 1px 6px rgba(0,0,0,0.06); position:sticky; top:0; z-index:50; }
  .hud.boss { background:linear-gradient(90deg,var(--boss),#a03030); color:#fff; }
  .hud.boss .hud-score { color:#ffd700; } .hud.boss .hud-combo { color:#ffcc00; }
  .hud-left { display:flex; align-items:center; gap:14px; }
  .hud-score { font-weight:700; color:var(--primary); font-size:1.15em; }
  .hud-combo { font-size:0.8em; color:var(--gold); font-weight:600; opacity:0; transition:opacity .3s; }
  .hud-combo.show { opacity:1; }
  .hud-center { position:absolute; left:50%; transform:translateX(-50%); font-size:0.85em; color:#888; }
  .hud.boss .hud-center { color:rgba(255,255,255,0.8); }
  .hud-timer { font-weight:700; color:var(--text); }
  .hud-timer.warning { color:var(--danger); animation:pulse 1s infinite; }
  .hud.boss .hud-timer { color:#fff; }
  .progress-bar { height:3px; background:#eee; width:100%; }
  .progress-bar.boss { background:rgba(255,255,255,0.2); }
  .progress-fill { height:100%; background:var(--gold); width:0%; transition:width .4s ease; }
  .progress-fill.boss { background:var(--boss-gold); }
  .game-body { flex:1; padding:20px; max-width:720px; margin:0 auto; width:100%; display:flex; flex-direction:column; justify-content:center; }

  .q-card { background:var(--card-bg); border-radius:14px; padding:24px 20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); text-align:center; }
  .boss .q-card { border:2px solid rgba(139,30,30,0.15); }
  .q-type-label { font-size:0.8em; color:var(--gold); font-weight:600; margin-bottom:10px; letter-spacing:1px; }
  .boss .q-type-label { color:var(--boss); }
  .q-prompt { font-size:1.25em; font-weight:600; margin-bottom:20px; line-height:1.5; }
  .q-prompt .hint { color:#999; font-weight:400; font-size:0.85em; display:block; margin-top:6px; }
  .q-input { width:100%; max-width:280px; padding:12px 16px; font-size:1.1em; font-family:inherit; border:2px solid #e0e0e0; border-radius:10px; text-align:center; outline:none; transition:border-color .2s; }
  .q-input:focus { border-color:var(--gold); }
  .q-input.correct { border-color:var(--success); background:rgba(45,138,62,0.06); }
  .q-input.wrong { border-color:var(--danger); background:rgba(192,57,43,0.06); animation:shake .4s; }
  .btn-submit { margin-top:14px; background:var(--gold); color:#fff; border:none; padding:10px 36px; font-size:1em; font-family:inherit; border-radius:24px; cursor:pointer; transition:opacity .2s; }
  .btn-submit:hover { opacity:0.9; } .btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
  .boss .btn-submit { background:var(--boss); }

  .option-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
  .option-btn { background:#f5f5f5; border:2px solid transparent; padding:14px 10px; border-radius:10px; cursor:pointer; font-family:inherit; font-size:0.95em; transition:all .15s; text-align:center; }
  .option-btn:hover { border-color:var(--gold); background:var(--light-gold); }
  .option-btn.correct { background:rgba(45,138,62,0.12); border-color:var(--success); color:var(--success); }
  .option-btn.wrong { background:rgba(192,57,43,0.1); border-color:var(--danger); color:var(--danger); animation:shake .4s; }
  .option-btn:disabled { cursor:default; }

  .tf-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:320px; margin:16px auto 0; }
  .tf-btn { padding:16px; font-size:1.4em; border-radius:12px; border:2px solid #e0e0e0; background:#fafafa; cursor:pointer; transition:all .15s; }
  .tf-btn:hover { border-color:var(--gold); background:var(--light-gold); }
  .tf-btn.correct { background:rgba(45,138,62,0.12); border-color:var(--success); }
  .tf-btn.wrong { background:rgba(192,57,43,0.1); border-color:var(--danger); animation:shake .4s; }

  .match-area { display:flex; gap:20px; justify-content:center; align-items:flex-start; flex-wrap:wrap; margin-top:10px; }
  .match-col { display:flex; flex-direction:column; gap:10px; min-width:140px; }
  .match-item { background:#f5f5f5; padding:12px 16px; border-radius:10px; cursor:pointer; border:2px solid transparent; transition:all .2s; text-align:center; font-size:0.95em; }
  .match-item:hover { border-color:var(--gold); }
  .match-item.selected { border-color:var(--primary); background:var(--light-gold); }
  .match-item.matched { background:rgba(45,138,62,0.1); border-color:var(--success); color:var(--success); cursor:default; }
  .match-item.bad { animation:shake .4s; border-color:var(--danger); }

  .feedback-float { position:fixed; left:50%; top:40%; transform:translate(-50%,-50%) scale(0.8); font-size:2em; font-weight:700; pointer-events:none; opacity:0; z-index:100; transition:all .4s ease; }
  .feedback-float.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
  .feedback-float.positive { color:var(--gold); text-shadow:0 2px 10px rgba(201,169,97,0.3); }
  .feedback-float.negative { color:var(--danger); }

  #result { align-items:center; justify-content:center; padding:30px 20px; }
  .result-box { max-width:420px; width:100%; text-align:center; }
  .result-title { font-size:1.6em; font-weight:700; margin-bottom:6px; }
  .result-sub { color:#888; margin-bottom:20px; }
  .result-score-big { font-size:3.5em; font-weight:700; color:var(--primary); line-height:1; }
  .result-stars { font-size:2em; margin:14px 0; letter-spacing:6px; }
  .result-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:20px 0; }
  .r-stat { background:var(--card-bg); padding:14px 8px; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,0.05); }
  .r-stat .num { font-size:1.3em; font-weight:700; color:var(--text); }
  .r-stat .lbl { font-size:0.75em; color:#999; margin-top:2px; }
  .btn-group { display:flex; gap:12px; justify-content:center; margin-top:24px; flex-wrap:wrap; }
  .btn-secondary { background:#fff; color:var(--text); border:2px solid #e0e0e0; padding:10px 28px; border-radius:24px; font-family:inherit; font-size:0.95em; cursor:pointer; }
  .btn-secondary:hover { border-color:var(--gold); }
  .boss-result .result-title { color:var(--boss); }
  .boss-result .result-score-big { color:var(--boss); }

  /* 排行榜 */
  .lb-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #f0f0f0; }
  .lb-rank { width:32px; text-align:center; font-weight:700; font-size:1.1em; }
  .lb-rank.gold { color:#D4A017; }
  .lb-rank.silver { color:#999; }
  .lb-rank.bronze { color:#CD7F32; }
  .lb-name { flex:1; font-weight:600; }
  .lb-score { text-align:right; }
  .lb-score-num { font-weight:700; color:var(--primary); font-size:1.1em; }
  .lb-score-detail { font-size:0.75em; color:#999; }

  .particle { position:fixed; width:6px; height:6px; border-radius:50%; background:var(--gold); pointer-events:none; z-index:99; }

  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(6px);} }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

  @media (max-width:480px){
    .cover-box h1 { font-size:1.5em; }
    .option-grid { grid-template-columns:1fr; }
    .match-area { flex-direction:column; align-items:center; }
    .hud-center { display:none; }
    .result-score-big { font-size:2.8em; }
  }
</style>
</head>
<body>

<!-- 登录 -->
<div id="login" class="screen active">
  <div class="login-box">
    <div class="gold-line"></div>
    <h1>🏰 拉丁词根闯关</h1>
    <div class="subtitle">输入你的游戏名开始冒险</div>
    <input type="text" class="login-input" id="loginName" placeholder="例如：DragonSlayer" maxlength="16" autocomplete="off">
    <button class="btn-main" onclick="doLogin()" style="margin-top:6px;">🚀 登录 / 开始</button>
    <p class="login-hint">同一游戏名的答题记录会自动汇总</p>
    <div class="user-list" id="userList" style="display:none;">
      <h4>已有角色 · 点击切换</h4>
      <div id="userChips"></div>
    </div>
    <button class="btn-secondary" onclick="openUserManager()" style="margin-top:16px;font-size:0.85em;padding:8px 20px;">👥 管理角色</button>
  </div>
</div>

<!-- 用户管理面板 -->
<div id="userManager" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="margin:0;">👥 角色管理</h3>
      <button onclick="closeUserManager()" style="background:none;border:none;font-size:1.4em;cursor:pointer;">×</button>
    </div>
    <div id="umContent"></div>
    <div style="text-align:center;margin-top:16px;">
      <button onclick="closeUserManager()" class="btn-secondary" style="font-size:0.9em;">关闭</button>
    </div>
  </div>
</div>

<!-- 封面 -->
<div id="cover" class="screen">
  <div class="cover-box">
    <div class="user-badge" id="coverUser" style="display:none;">
      <span>👤 <span id="coverUserName"></span></span>
      <button onclick="doLogout()">切换</button>
    </div>
    <h1>Caesar's English II</h1>
    <div class="subtitle">拉丁词根闯关</div>
    <div class="gold-line"></div>
    <p style="color:#666; font-size:0.9em; margin-bottom:6px;">6 种题型 · <span id="stemCount">50</span> 个词根 · 大魔王挑战</p>
    <div class="cover-stats">
      <div><span class="stat-num" id="totalStars">0</span>总星级</div>
      <div><span class="stat-num" id="bestTotal">0</span>最高总分</div>
      <div><span class="stat-num" id="unlockedCount">1</span>已解锁</div>
    </div>
    <button class="btn-main" onclick="goSelect()">🎮 开始挑战</button>
    <button class="btn-secondary" onclick="showLeaderboard()" style="margin-top:12px;">🏆 排行榜</button>
    <p style="margin-top:14px; font-size:0.8em; color:#aaa;">点击后解锁音效</p>
  </div>
</div>

<!-- 排行榜弹窗 -->
<div id="leaderboardModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:24px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="margin:0;color:var(--gold);">🏆 全服排行榜</h3>
      <button onclick="closeLeaderboard()" style="background:none;border:none;font-size:1.4em;cursor:pointer;">×</button>
    </div>
    <div id="lbContent"></div>
    <div style="text-align:center;margin-top:16px;font-size:0.8em;color:#aaa;">
      排行榜基于本地记录统计</div>
  </div>
</div>

<!-- 关卡选择 -->
<div id="levelSelect" class="screen">
  <div class="ls-header">
    <h2>选择关卡</h2>
    <p style="color:#888; font-size:0.85em;">通关前一关即解锁下一关 · 大魔王需要先积累错题</p>
  </div>
  <div class="ls-grid" id="levelGrid"></div>
</div>

<!-- 游戏 -->
<div id="game" class="screen">
  <div class="hud" id="gameHud">
    <div class="hud-left">
      <div class="hud-score">⚡ <span id="gScore">0</span></div>
      <div class="hud-combo" id="gCombo">连击 x0</div>
    </div>
    <div class="hud-center"><span id="gQuestionNum">1/10</span></div>
    <div class="hud-timer" id="gTimer"></div>
  </div>
  <div class="progress-bar" id="gameProgressBar"><div class="progress-fill" id="gProgress"></div></div>
  <div class="game-body" id="gameBody"></div>
</div>

<!-- 结果 -->
<div id="result" class="screen">
  <div class="result-box" id="resultBox">
    <div class="result-title" id="rTitle">关卡完成！</div>
    <div class="result-sub" id="rSubtitle"></div>
    <div class="result-score-big" id="rScore">0</div>
    <div class="result-stars" id="rStars"></div>
    <div class="result-stats">
      <div class="r-stat"><div class="num" id="rCorrect">0</div><div class="lbl">正确</div></div>
      <div class="r-stat"><div class="num" id="rWrong">0</div><div class="lbl">错误</div></div>
      <div class="r-stat"><div class="num" id="rCombo">0</div><div class="lbl">最高连击</div></div>
    </div>
    <div class="btn-group">
      <button class="btn-secondary" onclick="retryLevel()">再试一次</button>
      <button class="btn-main" onclick="goSelect()" style="margin-top:0; padding:10px 28px; font-size:0.95em;">返回关卡</button>
    </div>
  </div>
</div>

<!-- 反馈浮层 -->
<div id="feedback" class="feedback-float"></div>

<script>
/* ================= 数据 ================= */
const ALL_STEMS = [
  {s:'com',m:'together',ex:['combine','complete','complex']},
  {s:'intra',m:'within',ex:['intramural','intracellular','intravenous']},
  {s:'cent',m:'one hundred',ex:['century','centimeter','centurion']},
  {s:'ad',m:'to',ex:['adhere','adapt','advocate']},
  {s:'fer',m:'carry',ex:['transfer','aquifer','conifer']},
  {s:'vita',m:'life',ex:['vital','vitamin','revitalize']},
  {s:'vid',m:'look',ex:['video','evidence','provide']},
  {s:'pater',m:'father',ex:['paternal','patriarch','expatriate']},
  {s:'matri',m:'mother',ex:['maternal','matriarch','matrimony']},
  {s:'pop',m:'people',ex:['popular','population','populous']},
  {s:'loco',m:'place',ex:['locomotive','location','dislocate']},
  {s:'sur',m:'over',ex:['surface','surrealist','surfeit']},
  {s:'alter',m:'other',ex:['alteration','alternative','altruism']},
  {s:'contra',m:'against',ex:['contradict','contrast','contrary']},
  {s:'stell',m:'star',ex:['stellar','constellation','interstellar']},
  {s:'amat',m:'love',ex:['amorous','amateur','amity']},
  {s:'luna',m:'moon',ex:['lunar','lunatic','sublunar']},
  {s:'greg',m:'group',ex:['congregate','segregate','gregarious']},
  {s:'clam',m:'cry out',ex:['clamor','exclamation','declaim']},
  {s:'tang',m:'touch',ex:['tangle','tangent','intangible']},
  {s:'mar',m:'sea',ex:['marine','maritime','mariner']},
  {s:'junct',m:'join',ex:['conjunction','junction','adjunct']},
  {s:'luc',m:'light',ex:['lucidity','translucent','pellucid']},
  {s:'medi',m:'middle',ex:['medium','Mediterranean','in medias res']},
  {s:'tempor',m:'time',ex:['temporal','temporize','contemporary']},
  {s:'grat',m:'pleasing',ex:['gratification','ingratiate','gratuitous']},
  {s:'curr',m:'run',ex:['current','recur','incur']},
  {s:'trans',m:'across',ex:['transfer','transfusion','transcendent']},
  {s:'migr',m:'wander',ex:['migrate','migratory','transmigration']},
  {s:'rupt',m:'break',ex:['abrupt','corrupt','disrupt']},
  {s:'clud',m:'close',ex:['exclude','included','preclude']},
  {s:'se',m:'apart',ex:['separate','secede','sedition']},
  {s:'plu',m:'more',ex:['plus','pluralism','nonplussed']},
  {s:'germ',m:'vital',ex:['germ','germinate','germane']},
  {s:'fus',m:'pour',ex:['transfusion','infusion','fusillade']},
  {s:'culp',m:'blame',ex:['culprit','culpable','exculpate']},

/* ================= 用户系统 ================= */
function userKey(u){ return 'ce2_u3_'+encodeURIComponent(u); }
function getUserData(u){
  if(!u) return {unlocked:[1],best:{},history:[]};
  try{ const d=JSON.parse(localStorage.getItem(userKey(u))||'{}');
    return {unlocked:d.unlocked||[1],best:d.best||{},history:d.history||[]};
  }catch(e){ return {unlocked:[1],best:{},history:[]}; }
}
function saveUserData(u,data){
  if(!u) return; localStorage.setItem(userKey(u),JSON.stringify(data));
}
function addHistory(stemIndex,correct,level){
  const data=getUserData(state.currentUser);
  const st=ALL_STEMS[stemIndex];
  data.history.push({stemIndex,stem:st.s,mean:st.m,correct,timestamp:Date.now(),level});
  saveUserData(state.currentUser,data);
}
function getWeakStems(){
  const data=getUserData(state.currentUser);
  const hist=data.history||[];
  const stats={};
  hist.forEach(h=>{
    if(!stats[h.stemIndex]) stats[h.stemIndex]={total:0,wrong:0,stem:h.stem,mean:h.mean};
    stats[h.stemIndex].total++;
    if(!h.correct) stats[h.stemIndex].wrong++;
  });
  const ranked=Object.values(stats).filter(s=>s.total>0).map(s=>({...s,rate:s.wrong/s.total})).sort((a,b)=>b.rate-a.rate);
  const count=Math.max(5,Math.min(15,Math.ceil(ranked.length*0.2)));
  return ranked.slice(0,count);
}
function listUsers(){
  const users=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('ce2_u3_')) users.push(decodeURIComponent(k.replace('ce2_u3_','')));
  }
  return users;
}

let audioCtx=null;
function initAudio(){ if(audioCtx)return; audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
function tone(freq,dur,type='sine',vol=0.08){
  if(!audioCtx)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq; g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur);
}
function sfxCorrect(){ tone(880,0.1); setTimeout(()=>tone(1100,0.15),80); }
function sfxWrong(){ tone(180,0.35,'sawtooth',0.06); }
function sfxCombo(){ tone(1200,0.08); setTimeout(()=>tone(1500,0.12),60); }
function sfxBossHit(){ tone(600,0.15); setTimeout(()=>tone(800,0.2),100); setTimeout(()=>tone(1000,0.3),220); }
function sfxBossWin(){ [0,120,250,400].forEach((d,i)=>setTimeout(()=>tone(500+i*250,0.3),d)); }

/* ================= 题目生成 ================= */
function maskStem(s){ if(s.length<=2) return s[0]+'_'; return s[0]+'_'.repeat(s.length-2)+s[s.length-1]; }
function getWrongMean(correctIdx){ let idx; do{idx=Math.floor(Math.random()*ALL_STEMS.length);}while(idx===correctIdx); return ALL_STEMS[idx].m; }
function generateOptions(correctIdx){ const opts=[ALL_STEMS[correctIdx].s]; while(opts.length<4){ const idx=Math.floor(Math.random()*ALL_STEMS.length); if(idx!==correctIdx&&!opts.includes(ALL_STEMS[idx].s)) opts.push(ALL_STEMS[idx].s); } return opts.sort(()=>Math.random()-0.5); }

function generateQuestions(lv){
  const qs=[];
  if(lv.type==='fill'){ lv.indices.forEach(idx=>{ const st=ALL_STEMS[idx]; qs.push({type:'fill',stem:st.s,mean:st.m,masked:maskStem(st.s),answer:st.s,index:idx}); }); }
  else if(lv.type==='find'){ lv.indices.forEach(idx=>{ const st=ALL_STEMS[idx]; const ex=st.ex[Math.floor(Math.random()*st.ex.length)]; qs.push({type:'find',stem:st.s,mean:st.m,exWord:ex,answer:st.s,index:idx}); }); }
  else if(lv.type==='match'){
    const perRound=5; const totalRounds=Math.ceil(lv.indices.length/perRound); for(let round=0;round<totalRounds;round++){ const slice=lv.indices.slice(round*perRound,(round+1)*perRound); const left=[],right=[]; slice.forEach(idx=>{ const st=ALL_STEMS[idx]; left.push({id:idx,text:st.s,sub:st.m}); right.push({id:idx,text:st.ex[0],sub:''}); }); right.sort(()=>Math.random()-0.5); qs.push({type:'match',left,right,totalPairs:slice.length,round:round+1}); }
  }
  else if(lv.type==='tf'){ const shuffled=[...lv.indices].sort(()=>Math.random()-0.5); const half=Math.floor(shuffled.length/2); shuffled.slice(0,half).forEach(idx=>{ const st=ALL_STEMS[idx]; qs.push({type:'tf',text:`${st.s} = ${st.m}`,answer:true,stem:st.s,mean:st.m,index:idx}); }); shuffled.slice(half).forEach(idx=>{ const st=ALL_STEMS[idx]; qs.push({type:'tf',text:`${st.s} = ${getWrongMean(idx)}`,answer:false,stem:st.s,mean:st.m,index:idx}); }); qs.sort(()=>Math.random()-0.5); }
  else if(lv.type==='build'){ BUILD_QUESTIONS.forEach((q,i)=>qs.push({type:'build',parts:q.parts,answer:q.ans,mean:q.mean,index:i})); }
  else if(lv.type==='blitz'){ const pool=[...Array(ALL_STEMS.length).keys()].sort(()=>Math.random()-0.5).slice(0,20); pool.forEach(idx=>{ const st=ALL_STEMS[idx]; qs.push({type:'blitz',mean:st.m,answer:st.s,options:generateOptions(idx),index:idx}); }); }
  else if(lv.type==='boss'){
    const weak=getWeakStems();
    if(weak.length===0){
      const pool=[...Array(ALL_STEMS.length).keys()].sort(()=>Math.random()-0.5).slice(0,10);
      pool.forEach(idx=>{ const st=ALL_STEMS[idx]; qs.push({type:'boss_pick',mean:st.m,answer:st.s,options:generateOptions(idx),index:idx}); });
    }else{
      const types=['boss_pick','boss_type','boss_tf','boss_build'];
      weak.forEach((ws,i)=>{
        const st=ALL_STEMS.find(x=>x.s===ws.stem);
        if(!st) return;
        const idx=ALL_STEMS.indexOf(st);
        const t1=types[i%types.length];
        if(t1==='boss_pick') qs.push({type:'boss_pick',mean:ws.mean,answer:ws.stem,options:generateOptions(idx),index:idx});
        else if(t1==='boss_type') qs.push({type:'boss_type',mean:ws.mean,answer:ws.stem,index:idx,ex:st.ex[0]});
        else if(t1==='boss_tf'){ const fake=Math.random()>0.5; qs.push({type:'boss_tf',text:`${ws.stem} = ${fake?getWrongMean(idx):ws.mean}`,answer:!fake,stem:ws.stem,mean:ws.mean,index:idx}); }
        else if(t1==='boss_build'){ const bq=BUILD_QUESTIONS.find(b=>b.ans.includes(ws.stem)||b.parts.includes(ws.stem)); if(bq) qs.push({type:'boss_build',parts:bq.parts,answer:bq.ans,mean:bq.mean,index:idx}); else qs.push({type:'boss_pick',mean:ws.mean,answer:ws.stem,options:generateOptions(idx),index:idx}); }
        const t2=types[(i+1)%types.length];
        if(t2==='boss_pick') qs.push({type:'boss_pick',mean:ws.mean,answer:ws.stem,options:generateOptions(idx),index:idx});
        else if(t2==='boss_type') qs.push({type:'boss_type',mean:ws.mean,answer:ws.stem,index:idx,ex:st.ex[0]});
        else if(t2==='boss_tf'){ const fake=Math.random()>0.5; qs.push({type:'boss_tf',text:`${ws.stem} = ${fake?getWrongMean(idx):ws.mean}`,answer:!fake,stem:ws.stem,mean:ws.mean,index:idx}); }
        else if(t2==='boss_build'){ const bq=BUILD_QUESTIONS.find(b=>b.ans.includes(ws.stem)||b.parts.includes(ws.stem)); if(bq) qs.push({type:'boss_build',parts:bq.parts,answer:bq.ans,mean:bq.mean,index:idx}); else qs.push({type:'boss_pick',mean:ws.mean,answer:ws.stem,options:generateOptions(idx),index:idx}); }
      });
      qs.sort(()=>Math.random()-0.5);
    }
  }
  return qs;
}

function startLevel(id){
  initAudio(); state.lv=LEVELS.find(l=>l.id===id);
  state.score=0; state.combo=0; state.maxCombo=0; state.correct=0; state.wrong=0; state.qi=0; state.questions=generateQuestions(state.lv);
  state.answering=false; state.matchState={side:null,id:null,el:null};
  const hud=document.getElementById('gameHud'); const bar=document.getElementById('gameProgressBar'); const fill=document.getElementById('gProgress');
  if(state.lv.boss){ hud.classList.add('boss'); bar.classList.add('boss'); fill.classList.add('boss'); }
  else{ hud.classList.remove('boss'); bar.classList.remove('boss'); fill.classList.remove('boss'); }
  updateHUD(); showScreen('game'); renderQuestion();
  if(state.lv.time>0){ state.timeLeft=state.lv.time; startTimer(); }
  else{ state.timeLeft=0; document.getElementById('gTimer').textContent=''; }
}
function startTimer(){ clearInterval(state.timer); const el=document.getElementById('gTimer'); state.timer=setInterval(()=>{ state.timeLeft--; const m=Math.floor(state.timeLeft/60),s=state.timeLeft%60; el.textContent=`${m}:${s<10?'0'+s:s}`; if(state.timeLeft<=10) el.classList.add('warning'); else el.classList.remove('warning'); if(state.timeLeft<=0){ clearInterval(state.timer); finishLevel(); } },1000); const m=Math.floor(state.timeLeft/60),s=state.timeLeft%60; el.textContent=`${m}:${s<10?'0'+s:s}`; }

/* ================= 渲染题目 ================= */
function renderQuestion(){
  const body=document.getElementById('gameBody');
  if(state.qi>=state.questions.length){ finishLevel(); return; }
  const q=state.questions[state.qi]; updateHUD();
  const bossCls=state.lv.boss?'boss':'';

  if(q.type==='fill'){
    body.innerHTML=`<div class="q-card ${bossCls}"><div class="q-type-label">LEVEL ${state.lv.id} · 拼写补全</div><div class="q-prompt">${q.masked}<span class="hint">= ${q.mean}</span></div><input type="text" class="q-input" id="ansInput" placeholder="输入完整词根" autocomplete="off" onkeydown="if(event.key==='Enter')checkFill()"><div><button class="btn-submit" onclick="checkFill()">确认</button></div></div>`;
    setTimeout(()=>document.getElementById('ansInput').focus(),50);
  }else if(q.type==='find'){
    body.innerHTML=`<div class="q-card ${bossCls}"><div class="q-type-label">LEVEL ${state.lv.id} · 找出词根</div><div class="q-prompt">"${q.exWord}"<span class="hint">包含的词根是？</span></div><input type="text" class="q-input" id="ansInput" placeholder="输入词根" autocomplete="off" onkeydown="if(event.key==='Enter')checkFind()"><div><button class="btn-submit" onclick="checkFind()">确认</button></div></div>`;
    setTimeout(()=>document.getElementById('ansInput').focus(),50);
  }else if(q.type==='match'){
    renderMatchQuestion(q,body);
  }else if(q.type==='tf'||q.type==='boss_tf'){
    const label=q.type==='boss_tf'?'魔王·真假判断':`LEVEL ${state.lv.id} · 真假法庭`;
    body.innerHTML=`<div class="q-card ${bossCls}"><div class="q-type-label">${label}</div><div class="q-prompt">${q.text}<span class="hint">这个对应关系正确吗？</span></div><div class="tf-grid"><button class="tf-btn" onclick="checkTF(true)">✓ 正确</button><button class="tf-btn" onclick="checkTF(false)">✗ 错误</button></div></div>`;
  }else if(q.type==='build'||q.type==='boss_build'){
    const label=q.type==='boss_build'?'魔王· 构词工坊':`LEVEL ${state.lv.id} · 构词工坊`;
    body.innerHTML=`<div class="q-card ${bossCls}"><div class="q-type-label">${label}</div><div class="q-prompt">${q.parts}<span class="hint">它们构成的单词是？</span></div><input type="text" class="q-input" id="ansInput" placeholder="输入单词" autocomplete="off" onkeydown="if(event.key==='Enter')checkBuild()"><div><button class="btn-submit" onclick="checkBuild()">确认</button></div></div>`;
    setTimeout(()=>document.getElementById('ansInput').focus(),50);
  }else if(q.type==='blitz'||q.type==='boss_pick'){
    const label=q.type==='boss_pick'?'魔王·极速选择':`LEVEL ${state.lv.id} · 闪电战`;
    body.innerHTML=`<div class="q-card ${bossCls}"><div class="q-type-label">${label}</div><div class="q-prompt">"${q.mean}"<span class="hint">哪个词根表示这个意思？</span></div><div class="option-grid" id="blitzGrid"></div></div>`;
    const grid=document.getElementById('blitzGrid');
    q.options.forEach(opt=>{ const btn=document.createElement('button'); btn.className='option-btn'; btn.textContent=opt; btn.onclick=function(){ checkBlitz(opt,this); }; grid.appendChild(btn); });
  }else if(q.type==='boss_type'){
    body.innerHTML=`<div class="q-card ${bossCls}"><div class="q-type-label">魔王· 拆词侦探</div><div class="q-prompt">"${q.ex}"<span class="hint">包含的词根是？（意思：${q.mean}）</span></div><input type="text" class="q-input" id="ansInput" placeholder="输入词根" autocomplete="off" onkeydown="if(event.key==='Enter')checkBossType()"><div><button class="btn-submit" onclick="checkBossType()">确认</button></div></div>`;
    setTimeout(()=>document.getElementById('ansInput').focus(),50);
  }
}

/* -------- 连线题 -------- */
function renderMatchQuestion(q,body){
  body.innerHTML=`<div class="q-card"><div class="q-type-label">LEVEL ${state.lv.id} · 连线配对 · 第 ${q.round}/2 轮</div><div class="q-prompt">点击左栏词根，再点击右栏对应的例词</div><div class="match-area"><div class="match-col" id="mLeft"></div><div class="match-col" id="mRight"></div></div></div>`;
  const left=document.getElementById('mLeft'); const right=document.getElementById('mRight');
  q.left.forEach(it=>{ const el=document.createElement('div'); el.className='match-item'; el.dataset.id=it.id; el.innerHTML=`<b>${it.text}</b><br><span style="font-size:0.8em;color:#888">${it.sub}</span>`; el.onclick=()=>onMatchSelect('left',it.id,el,q); left.appendChild(el); });
  q.right.forEach(it=>{ const el=document.createElement('div'); el.className='match-item'; el.dataset.id=it.id; el.innerHTML=`<b>${it.text}</b>`; el.onclick=()=>onMatchSelect('right',it.id,el,q); right.appendChild(el); });
}
function onMatchSelect(side,id,el,q){
  if(state.answering || el.classList.contains('matched')) return;
  if(!state.matchState.side){ state.matchState={side,id,el}; el.classList.add('selected'); return; }
  if(state.matchState.side===side){ state.matchState.el.classList.remove('selected'); state.matchState={side,id,el}; el.classList.add('selected'); return; }
  const other=state.matchState;
  if(other.id===id){
    el.classList.add('matched'); other.el.classList.add('matched'); el.classList.remove('selected'); other.el.classList.remove('selected');
    sfxCorrect(); handleCorrect(el);
    addHistory(id,true,state.lv.id);
    state.matchState={side:null,id:null,el:null};
    const all=document.querySelectorAll('.match-item'); const done=[...all].every(x=>x.classList.contains('matched'));
    if(done) setTimeout(()=>{state.qi++; renderQuestion();},500);
  }else{
    el.classList.add('bad'); other.el.classList.add('bad'); sfxWrong(); handleWrong();
    addHistory(other.id,false,state.lv.id);
    setTimeout(()=>{ el.classList.remove('bad','selected'); other.el.classList.remove('bad','selected'); },400);
    state.matchState={side:null,id:null,el:null};
  }
}

/* ================= 答案判断 ================= */
function normalize(s){ return (s||'').trim().toLowerCase().replace(/\s+/g,''); }
function lockAndNext(fn){
  if(state.answering) return false;
  state.answering=true;
  fn();
  return true;
}
function unlockAndNext(delay){
  setTimeout(()=>{ state.answering=false; state.qi++; renderQuestion(); }, delay);
}
function checkFill(){
  if(!lockAndNext(()=>{
    const inp=document.getElementById('ansInput'); 
    if(!inp){ unlockAndNext(100); return; }
    const q=state.questions[state.qi];
    if(!q){ unlockAndNext(100); return; }
    const ok=normalize(inp.value)===normalize(q.answer);
    if(ok){ inp.classList.add('correct'); sfxCorrect(); handleCorrect(inp); addHistory(q.index,true,state.lv.id); }
    else{ inp.classList.add('wrong'); sfxWrong(); handleWrong(); addHistory(q.index,false,state.lv.id); }
    unlockAndNext(ok?500:900);
  })){}
}
function checkFind(){
  if(!lockAndNext(()=>{
    const inp=document.getElementById('ansInput'); 
    if(!inp){ unlockAndNext(100); return; }
    const q=state.questions[state.qi];
    if(!q){ unlockAndNext(100); return; }
    const ok=normalize(inp.value)===normalize(q.answer);
    if(ok){ inp.classList.add('correct'); sfxCorrect(); handleCorrect(inp); addHistory(q.index,true,state.lv.id); }
    else{ inp.classList.add('wrong'); sfxWrong(); handleWrong(); addHistory(q.index,false,state.lv.id); }
    unlockAndNext(ok?500:900);
  })){}
}
function checkTF(userAns){
  if(!lockAndNext(()=>{
    const q=state.questions[state.qi]; 
    if(!q){ unlockAndNext(100); return; }
    const ok=userAns===q.answer;
    const btns=document.querySelectorAll('.tf-btn'); btns.forEach(b=>b.disabled=true);
    if(ok){ btns[userAns?0:1].classList.add('correct'); sfxCorrect(); handleCorrect(btns[0]); addHistory(q.index,true,state.lv.id); }
    else{ btns[userAns?0:1].classList.add('wrong'); sfxWrong(); handleWrong(); addHistory(q.index,false,state.lv.id); }
    unlockAndNext(ok?500:900);
  })){}
}
function checkBuild(){
  if(!lockAndNext(()=>{
    const inp=document.getElementById('ansInput'); 
    if(!inp){ unlockAndNext(100); return; }
    const q=state.questions[state.qi];
    if(!q){ unlockAndNext(100); return; }
    const ok=normalize(inp.value)===normalize(q.answer);
    if(ok){ inp.classList.add('correct'); sfxCorrect(); handleCorrect(inp); if(q.index!==undefined) addHistory(q.index,true,state.lv.id); }
    else{ inp.classList.add('wrong'); sfxWrong(); handleWrong(); if(q.index!==undefined) addHistory(q.index,false,state.lv.id); }
    unlockAndNext(ok?500:900);
  })){}
}
function checkBlitz(opt,btn){
  if(!lockAndNext(()=>{
    const q=state.questions[state.qi]; 
    if(!q){ unlockAndNext(100); return; }
    const ok=opt===q.answer;
    const all=document.querySelectorAll('#blitzGrid .option-btn'); all.forEach(b=>b.disabled=true);
    if(ok){ btn.classList.add('correct'); sfxCorrect(); handleCorrect(btn); addHistory(q.index,true,state.lv.id); }
    else{ btn.classList.add('wrong'); sfxWrong(); handleWrong(); all.forEach(b=>{if(b.textContent===q.answer)b.classList.add('correct');}); addHistory(q.index,false,state.lv.id); }
    unlockAndNext(ok?500:1100);
  })){}
}
function checkBossType(){
  if(!lockAndNext(()=>{
    const inp=document.getElementById('ansInput'); 
    if(!inp){ unlockAndNext(100); return; }
    const q=state.questions[state.qi];
    if(!q){ unlockAndNext(100); return; }
    const ok=normalize(inp.value)===normalize(q.answer);
    if(ok){ inp.classList.add('correct'); sfxCorrect(); handleCorrect(inp); addHistory(q.index,true,state.lv.id); }
    else{ inp.classList.add('wrong'); sfxWrong(); handleWrong(); addHistory(q.index,false,state.lv.id); }
    unlockAndNext(ok?500:900);
  })){}
}

/* ================= 分数与激励 ================= */
function handleCorrect(el){
  try{
    state.combo++; state.correct++;
    if(state.combo>state.maxCombo) state.maxCombo=state.combo;
    let add=10;
    if(state.lv.boss){ add=15; sfxBossHit(); showFeedback('击退!'); }
    else if(state.combo>=3){ add+=5; sfxCombo(); showFeedback('连击!'); }
    else if(state.combo>=2){ add+=3; showFeedback('很棒!'); }
    else { showFeedback('正确!'); }
    state.score+=add; updateHUD(); spawnParticles(el);
  }catch(e){ console.error('handleCorrect error',e); }
}
function handleWrong(){
  try{
    state.combo=0; state.wrong++;
    if(state.lv.boss) showFeedback('魔王反击!');
    updateHUD();
  }catch(e){ console.error('handleWrong error',e); }
}
function showFeedback(text){
  try{
    const el=document.getElementById('feedback'); 
    el.textContent=text;
    el.className='feedback-float positive';
    void el.offsetWidth;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),600);
  }catch(e){}
}

/* ================= 粒子特效 ================= */
function spawnParticles(originEl){
  try{
    if(!originEl) return;
    const rect=originEl.getBoundingClientRect(); 
    if(!rect.width && !rect.height) return;
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    for(let i=0;i<12;i++){
      const p=document.createElement('div'); p.className='particle';
      const angle=(Math.PI*2*i)/12, dist=30+Math.random()*50;
      p.style.left=cx+'px'; p.style.top=cy+'px';
      p.style.background=state.lv.boss?'#D4A017':(i%2===0?'var(--gold)':'var(--primary)');
      document.body.appendChild(p);
      const tx=Math.cos(angle)*dist, ty=Math.sin(angle)*dist;
      if(p.animate) p.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:`translate(${tx}px,${ty}px) scale(0)`,opacity:0}],{duration:600,easing:'ease-out'});
      setTimeout(()=>p.remove(),600);
    }
  }catch(e){ console.error('spawnParticles error',e); }
}

/* ================= 结束关卡 ================= */
function finishLevel(){
  clearInterval(state.timer); const lv=state.lv; const totalQ=state.questions.length;
  const accuracy=totalQ>0?state.correct/totalQ:0;
  let stars=1; if(accuracy>=0.9) stars=3; else if(accuracy>=0.7) stars=2;
  if(lv.boss && state.wrong===0) stars=3;

  const data=getUserData(state.currentUser);
  const prev=data.best[lv.id];
  if(!prev || state.score>prev.score){ data.best[lv.id]={score:state.score,stars,correct:state.correct,wrong:state.wrong}; }
  if(!prev || stars>prev.stars) data.best[lv.id].stars=stars;
  const nextId=lv.id+1;
  if(nextId<=LEVELS.length && !data.unlocked.includes(nextId)){ data.unlocked.push(nextId); }
  saveUserData(state.currentUser,data);

  if(lv.boss) sfxBossWin(); else sfxLevelUp();

  const box=document.getElementById('resultBox');
  if(lv.boss){ box.classList.add('boss-result'); } else { box.classList.remove('boss-result'); }

  document.getElementById('rTitle').textContent=lv.boss?'🏆 魔王已被击败!':lv.title+' 完成！';
  document.getElementById('rSubtitle').textContent=accuracy===1?(lv.boss?'完美击败魔王！':'太棒了！全部答对！'):accuracy>=0.8?'表现优秀！':'继续加油！';
  document.getElementById('rScore').textContent=state.score;
  document.getElementById('rStars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('rCorrect').textContent=state.correct;
  document.getElementById('rWrong').textContent=state.wrong;
  document.getElementById('rCombo').textContent=state.maxCombo;
  showScreen('result');
}
function retryLevel(){ startLevel(state.lv.id); }

/* ================= 排行榜 ================= */
function showLeaderboard(){
  renderLeaderboard();
  document.getElementById('leaderboardModal').style.display='flex';
}
function closeLeaderboard(){ document.getElementById('leaderboardModal').style.display='none'; }
function renderLeaderboard(){
  const users=listUsers();
  const rows=users.map(u=>{
    const d=getUserData(u);
    const best=d.best||{};
    const totalScore=Object.values(best).reduce((a,b)=>a+(b.score||0),0);
    const totalStars=Object.values(best).reduce((a,b)=>a+(b.stars||0),0);
    const totalCorrect=Object.values(best).reduce((a,b)=>a+(b.correct||0),0);
    const totalQ=Object.values(best).reduce((a,b)=>a+(b.correct||0)+(b.wrong||0),0);
    const unlocked=(d.unlocked||[]).length;
    return {name:u,score:totalScore,stars:totalStars,correct:totalCorrect,totalQ,unlocked};
  }).sort((a,b)=>b.score-a.score);
  const el=document.getElementById('lbContent');
  if(rows.length===0){ el.innerHTML='<div style="text-align:center;color:#aaa;padding:20px;">暂无记录，快来成为第一名！</div>'; return; }
  el.innerHTML=rows.slice(0,20).map((r,i)=>{
    const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    return `<div class="lb-row">
      <div class="lb-rank ${rankCls}">${medal}</div>
      <div class="lb-name">${r.name}</div>
      <div class="lb-score">
        <div class="lb-score-num">${r.score}</div>
        <div class="lb-score-detail">★${r.stars} · ${r.correct}/${r.totalQ} · ${r.unlocked}关</div>
      </div>
    </div>`;
  }).join('');
}

/* ================= 全局错误捕获 ================= */
window.onerror=function(msg,url,line,col,err){
  console.error('Global error:',msg,'at',line+':'+col);
  return false;
};

/* ================= 初始化 ================= */
renderLogin();
if(!loadLastUser()){
  showScreen('login');
}
