<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="url(#skyGrad)"/>
  
  <!-- Ground -->
  <ellipse cx="200" cy="280" rx="160" ry="30" fill="#E8E4DC"/>
  
  <!-- Garden bed -->
  <rect x="80" y="240" width="240" height="25" rx="4" fill="#C9A961" opacity="0.6"/>
  <rect x="85" y="245" width="230" height="15" rx="2" fill="#8B7355" opacity="0.3"/>
  
  <!-- Flowers -->
  <g transform="translate(110, 220)">
    <line x1="0" y1="30" x2="0" y2="10" stroke="#7CB342" stroke-width="3"/>
    <circle cx="0" cy="8" r="8" fill="#E85D04" opacity="0.9"/>
    <circle cx="0" cy="8" r="4" fill="#F5A623"/>
    <ellipse cx="-6" cy="25" rx="5" ry="3" fill="#7CB342"/>
    <ellipse cx="6" cy="22" rx="5" ry="3" fill="#7CB342"/>
  </g>
  
  <g transform="translate(150, 210)">
    <line x1="0" y1="40" x2="0" y2="12" stroke="#7CB342" stroke-width="3"/>
    <circle cx="0" cy="10" r="10" fill="#C9A961" opacity="0.9"/>
    <circle cx="0" cy="10" r="5" fill="#F5A623"/>
    <ellipse cx="-8" cy="30" rx="6" ry="4" fill="#7CB342"/>
    <ellipse cx="8" cy="28" rx="6" ry="4" fill="#7CB342"/>
  </g>
  
  <g transform="translate(190, 225)">
    <line x1="0" y1="25" x2="0" y2="8" stroke="#7CB342" stroke-width="3"/>
    <circle cx="0" cy="6" r="7" fill="#E85D04" opacity="0.8"/>
    <circle cx="0" cy="6" r="3" fill="#F5A623"/>
    <ellipse cx="-5" cy="20" rx="4" ry="3" fill="#7CB342"/>
    <ellipse cx="5" cy="18" rx="4" ry="3" fill="#7CB342"/>
  </g>
  
  <g transform="translate(230, 215)">
    <line x1="0" y1="35" x2="0" y2="10" stroke="#7CB342" stroke-width="3"/>
    <circle cx="0" cy="8" r="9" fill="#C9A961" opacity="0.85"/>
    <circle cx="0" cy="8" r="4" fill="#F5A623"/>
    <ellipse cx="-7" cy="26" rx="5" ry="3" fill="#7CB342"/>
    <ellipse cx="7" cy="24" rx="5" ry="3" fill="#7CB342"/>
  </g>
  
  <g transform="translate(270, 228)">
    <line x1="0" y1="22" x2="0" y2="6" stroke="#7CB342" stroke-width="3"/>
    <circle cx="0" cy="4" r="6" fill="#E85D04" opacity="0.85"/>
    <circle cx="0" cy="4" r="3" fill="#F5A623"/>
    <ellipse cx="-4" cy="17" rx="4" ry="2" fill="#7CB342"/>
    <ellipse cx="4" cy="15" rx="4" ry="2" fill="#7CB342"/>
  </g>
  
  <!-- Small plants -->
  <g transform="translate(130, 235)">
    <path d="M0,10 Q-5,0 -8,-5 M0,10 Q5,0 8,-5 M0,10 L0,-2" stroke="#7CB342" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="-3" rx="3" ry="5" fill="#7CB342" opacity="0.8"/>
  </g>
  
  <g transform="translate(250, 238)">
    <path d="M0,8 Q-4,0 -6,-4 M0,8 Q4,0 6,-4 M0,8 L0,-1" stroke="#7CB342" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="-2" rx="3" ry="4" fill="#7CB342" opacity="0.8"/>
  </g>
  
  <!-- Gardener -->
  <g transform="translate(200, 180)">
    <!-- Legs -->
    <rect x="-18" y="55" width="14" height="35" rx="3" fill="#5D4E37"/>
    <rect x="4" y="55" width="14" height="35" rx="3" fill="#5D4E37"/>
    <!-- Boots -->
    <ellipse cx="-11" cy="92" rx="10" ry="5" fill="#3D3229"/>
    <ellipse cx="11" cy="92" rx="10" ry="5" fill="#3D3229"/>
    <!-- Body -->
    <rect x="-22" y="15" width="44" height="48" rx="8" fill="#E85D04" opacity="0.9"/>
    <!-- Apron -->
    <rect x="-16" y="25" width="32" height="38" rx="3" fill="#C9A961" opacity="0.8"/>
    <rect x="-14" y="20" width="28" height="6" rx="2" fill="#C9A961" opacity="0.8"/>
    <!-- Arms -->
    <rect x="-32" y="20" width="12" height="32" rx="4" fill="#E85D04" opacity="0.8" transform="rotate(20 -26 20)"/>
    <rect x="20" y="20" width="12" height="32" rx="4" fill="#E85D04" opacity="0.8" transform="rotate(-20 26 20)"/>
    <!-- Hands -->
    <circle cx="-30" cy="52" r="5" fill="#F5CBA7"/>
    <circle cx="30" cy="52" r="5" fill="#F5CBA7"/>
    <!-- Head -->
    <circle cx="0" cy="0" r="18" fill="#F5CBA7"/>
    <!-- Hair -->
    <path d="M-18,-2 Q-18,-16 0,-16 Q18,-16 18,-2 Q18,5 14,8 Q0,5 -14,8 Q-18,5 -18,-2" fill="#4A3728"/>
    <!-- Hat -->
    <ellipse cx="0" cy="-8" rx="28" ry="8" fill="#C9A961"/>
    <path d="M-14,-8 Q-10,-22 0,-22 Q10,-22 14,-8" fill="#C9A961"/>
    <!-- Face -->
    <circle cx="-5" cy="2" r="2" fill="#4A3728"/>
    <circle cx="5" cy="2" r="2" fill="#4A3728"/>
    <path d="M-4,10 Q0,13 4,10" stroke="#4A3728" stroke-width="1.5" fill="none"/>
    <!-- Watering can -->
    <g transform="translate(38, 45)">
      <rect x="0" y="0" width="22" height="18" rx="3" fill="#6B8E23"/>
      <rect x="18" y="-6" width="4" height="10" rx="1" fill="#6B8E23"/>
      <rect x="20" y="-8" width="10" height="3" rx="1" fill="#6B8E23"/>
      <path d="M0,5 Q-8,2 -8,8 Q-8,14 0,12" stroke="#6B8E23" stroke-width="2" fill="none"/>
    </g>
  </g>
  
  <!-- Sun -->
  <circle cx="340" cy="50" r="18" fill="#F5A623" opacity="0.6"/>
  <g stroke="#F5A623" stroke-width="2" opacity="0.5">
    <line x1="340" y1="22" x2="340" y2="12"/>
    <line x1="340" y1="78" x2="340" y2="88"/>
    <line x1="312" y1="50" x2="302" y2="50"/>
    <line x1="368" y1="50" x2="378" y2="50"/>
    <line x1="320" y1="30" x2="313" y2="23"/>
    <line x1="360" y1="70" x2="367" y2="77"/>
    <line x1="360" y1="30" x2="367" y2="23"/>
    <line x1="320" y1="70" x2="313" y2="77"/>
  </g>
  
  <!-- Small butterflies -->
  <g transform="translate(320, 120)">
    <ellipse cx="-3" cy="0" rx="4" ry="6" fill="#E85D04" opacity="0.6" transform="rotate(-20)"/>
    <ellipse cx="3" cy="0" rx="4" ry="6" fill="#E85D04" opacity="0.6" transform="rotate(20)"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#333" stroke-width="0.5"/>
  </g>
  
  <g transform="translate(70, 150)">
    <ellipse cx="-2.5" cy="0" rx="3" ry="5" fill="#C9A961" opacity="0.6" transform="rotate(-15)"/>
    <ellipse cx="2.5" cy="0" rx="3" ry="5" fill="#C9A961" opacity="0.6" transform="rotate(15)"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#333" stroke-width="0.5"/>
  </g>
</svg>
